<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiente em CSS</title>
    <style>
        *{ /* configurações globais do CSS */
            height: 100%;

        }
        /* efeito do degrade */
        body{
            /* degrade linear */
            background-image: linear-gradient(to bottom, #9909F6, #FC02CF, #FF0B60, #FE7B02, #FEBE00);
            /* degrade circular */
            background-image: radial-gradient(circle,  #9909F6, #FC02CF, #FF0B60, #FE7B02, #FEBE00);
            /* fixar o fundo */
            background-attachment: fixed;
        }
    </style>
</head>
<body>
    <h1>Testando Gradiente</h1>
</body>
</html>
