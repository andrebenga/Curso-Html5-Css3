<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        /* Carregar fonte que peguei na internet */
        @font-face {
            font-family: 'Love';
            src: url('fonts/love larry ttf.ttf');
            font-weight: normal;
            font-style: normal;
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        h1 {
            font-family: 'Love', 'Times New Roman', Times, serif;
            font-size: 3em;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>Olá mundo!</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Quis dicta cupiditate vel laboriosam dolore beatae corporis repellendus quia, repudiandae, officia aspernatur, ipsum nulla porro? Cum ab delectus modi a aliquid?</p>
    
</body>
</html>
