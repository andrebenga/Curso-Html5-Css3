<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../D003/favicon.ico" type="image/x-icon">
    <title>Mídias em HTML5</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p>Tente abrir este site em vários dispositivos diferentes ou simplesmente aumente ou diminua o tamanho do seu navegador</p>
    <!-- Aqui cada imagem irá abrir conforme a largura da tela disponível fazendo em que seja compatível com celular, tablet e pc -->
    <picture>
        <source media="(max-width: 750px)" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/foto-m.png" type="image/png">
        <img src="imagens/foto-g.png" alt="Imagem flexível">
    </picture>
    <h1>Reproduzindo Áudio</h1>
    <p>Vamos aprender a reproduzir áudios em HTML5.</p>
    <!-- Desse jeito aqui não rolou a música automaticamente no navegador -->
    <!-- <audio src="media/happy-mistake.mp3" controls autoplay></audio> -->

    <!-- Já desse jeito rolou -->
     <audio preload="metadata">
        <source src="media/happy-mistake.mp3" type="audio/mpeg">
        <!-- <source src="media/happy-mistake.ogg" type="audio/ogg">
        <source src="media/happy-mistake.wav" type="audio/wav">
        <p>Infelizmente seu navegador não consegue reproduzir áudio.
            <a href="media/happy-mistake.mp3">Clique aqui para baixar o arquivo MP3</a>
        </p> -->
     </audio>
</body>
</html>
